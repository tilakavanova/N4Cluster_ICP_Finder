<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In | N4Cluster ICP Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { 950: '#040d1c', 900: '#0a1628', 800: '#0f2040' },
            cobalt: { 600: '#1a4fd6', 500: '#2563eb', 400: '#3b82f6' },
          }
        }
      }
    }
  </script>
</head>
<body class="h-full flex items-center justify-center">
  <div class="w-full max-w-sm mx-auto">
    <div class="text-center mb-8">
      <div class="w-12 h-12 rounded-xl bg-cobalt-500 flex items-center justify-center mx-auto mb-4">
        <span class="text-white font-bold text-lg">N4</span>
      </div>
      <h1 class="text-xl font-bold text-navy-950">ICP Dashboard</h1>
      <p class="text-sm text-slate-500 mt-1">Sign in to manage leads and data</p>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
      {% if error %}
      <div class="mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/dashboard/login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1" for="username">Username</label>
          <input
            id="username"
            name="username"
            type="text"
            required
            autocomplete="username"
            class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-cobalt-500/30 focus:border-cobalt-500"
            placeholder="admin">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1" for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            required
            autocomplete="current-password"
            class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-cobalt-500/30 focus:border-cobalt-500"
            placeholder="Enter password">
        </div>
        <button
          type="submit"
          class="w-full bg-cobalt-500 hover:bg-cobalt-600 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors text-sm">
          Sign In
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-slate-400 mt-6">
      Set DASHBOARD_USERNAME and DASHBOARD_PASSWORD in your environment variables.
    </p>
  </div>
</body>
</html>
