databases:
  - name: icp-finder-db
    plan: free
    databaseName: icp_finder
    user: icp_user
    postgresMajorVersion: "16"

services:
  - type: web
    name: icp-finder-api
    runtime: python
    plan: free
    buildCommand: chmod +x scripts/build.sh && ./scripts/build.sh
    startCommand: chmod +x scripts/start.sh && ./scripts/start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: icp-finder-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: icp-finder-redis
          type: redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: API_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://n4cluster.com,https://www.n4cluster.com"
      - key: DASHBOARD_USERNAME
        value: "admin"
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: YELP_FUSION_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
    healthCheckPath: /health

  - type: redis
    name: icp-finder-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
