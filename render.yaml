databases:
  - name: icp-finder-db
    plan: free
    databaseName: icp_finder
    user: icp_user
    postgresMajorVersion: "16"

services:
  # Combined: FastAPI + Celery worker + beat in one process
  - type: web
    name: icp-finder-api
    runtime: python
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: chmod +x start.sh && ./start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: icp-finder-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: icp-finder-redis
          type: redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: "3.12.3"
    healthCheckPath: /health

  # Redis
  - type: redis
    name: icp-finder-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
